<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>
  <script>
    (function() {
      // OAuth uses hash fragments (#) so Railway always serves index.html for any URL.
      // No need for complex 404 handling — just redirect unknown paths to home.
      var pathname = window.location.pathname;
      if (pathname !== '/' && !pathname.startsWith('/user/')) {
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body></body>
</html>
