  port: 8090
spring:
  cloud:
    gateway:
      routes:
        - id: api_route
          uri:  ${GATEWAY_INTERFACE_URL:https://interface-production-b00a.up.railway.app}

          predicates:
            - Path=/**
    autoconfigure:
      exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
