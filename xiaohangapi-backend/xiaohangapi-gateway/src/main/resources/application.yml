server:
  port: 8090
spring:
  cloud:
    gateway:
      routes:
        - id: api_route
          uri: https://interface-production-b00a.up.railway.app
          predicates:
            - Path=/**
    autoconfigure:
      exclude: org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
