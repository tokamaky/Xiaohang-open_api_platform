logging:
  level:
    org:
      springframework:
        cloud:
          gateway: trace


dubbo:
  application:
    application:
      qos-enable: true
      metadata-type: local
      qos-port: 33333
      qos-accept-foreign-ip: false
    name: xiaohangapi-consumer
  protocol:
    name: dubbo
    port: -1
  registry:
    id: nacos-registry
    address: nacos://${NACOS_SERVER:nacos-server:8848}
    parameters:
      namespace: public
      username: nacos
      password: nacos
    check: false          # ← 加这行，注册中心不可用时不报错
  consumer:
    check: false
  config-center:
    enabled: false   # ← 加这行，服务提供者不存在时不报错
  qos:
    port: 33333

