    name: xiaohangapi-consumer
    metadata-type: local
    qos-enable: false
  protocol:
    name: dubbo
    port: -1
    ext-protocol: tri
    preferred-protocol: tri
  registry:
    address: N/A
  consumer:
    check: false
  config-center:
    enabled: false
  metadata-report:
    enabled: false
  provider:
    url: ${GATEWAY_DUBBO_URL:https://interface-production-b00a.up.railway.app}
