# 公共配置文件
# @author Xiaohang
server:
  port: 8090
spring:
  cloud:
    gateway:
      routes:
        - id: api_route
          uri: ${GATEWAY_INTERFACE_URL:https://interface-production-b00a.up.railway.app}
          predicates:
            - Path=/**
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: 0

# 限流配置
rate-limit:
  # 每用户每分钟最大请求数（基于 accessKey）
  user:
    max-requests: 100
    window-seconds: 60
  # 每接口每分钟最大请求数
  interface:
    max-requests: 50
    window-seconds: 60
  # 全局限流（所有请求共享）
  global:
    max-requests: 1000
    window-seconds: 60

# 熔断降级配置
circuit-breaker:
  # 慢调用阈值（毫秒），超过此值的调用被视为慢调用
  slow-call-duration-ms: 2000
  # 慢调用比例阈值（0.0-1.0），超过此比例时熔断器打开
  slow-call-ratio-threshold: 0.5
  # 错误比例阈值（0.0-1.0），超过此比例时熔断器打开
  error-ratio-threshold: 0.5
  # 熔断器打开的最小请求数
  min-request-amount: 5
  # 熔断器打开后的等待时间（秒）
  wait-duration-in-open-state-seconds: 30
