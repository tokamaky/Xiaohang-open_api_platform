spring:
  application:
    name: xiaohangapi-backend
  # DataSource Config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  # session 失效时间（分钟）
  session:
    timeout: 86400
    store-type: redis
    cookie:
      same-site: none    # ← 允许跨域携带 Cookie
      secure: true       # ← same-site=none 必须配合 secure
      http-only: true
  # redis 配置
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: 0
  # GitHub OAuth2 配置
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope: read:user,user:email
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

xiaohang:
  jwt:
    secret: ${JWT_SECRET:xiaohang-api-platform-secret-key-change-in-production}
    expiration-ms: 604800000
  gateway:
    host: ${GATEWAY_HOST:https://gateway-production-b0f7.up.railway.app}
server:
  port: 7529
  servlet:
    context-path: /api
    session: # ← 加这一层
     cookie:
        same-site: none
        secure: true
        http-only: true
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)

#xiaohangapi:
#  client:
#    secret-key: xiaohang
#    access-key: abcdefgh
dubbo:
  application:
    name: xiaohangapi-provider
    metadata-type: local
  qos:
    enable: false
  protocol:
    name: dubbo
    port: 20880
    ext-protocol: tri
    preferred-protocol: tri
    host: ${DUBBO_PROTOCOL_HOST:0.0.0.0}
  registry:
    address: N/A
  config-center:
    enabled: false
  metadata-report:
    enabled: false

