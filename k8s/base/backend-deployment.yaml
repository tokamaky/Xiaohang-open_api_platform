# Backend API Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: xiaohang-api
  labels:
    app: backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        tier: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7529"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 7529
              protocol: TCP
          envFrom:
            - configMapRef:
                name: xiaohang-api-config
            - secretRef:
                name: xiaohang-api-secret
          env:
            - name: MYSQLHOST
              value: "mysql-service"
            - name: MYSQLPORT
              value: "3306"
            - name: GATEWAY_HOST
              value: "http://gateway-service:8090"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/user/health
              port: 7529
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/user/health
              port: 7529
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      volumes:
        - name: tmp
          emptyDir: {}
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: xiaohang-api
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7529
      targetPort: 7529
      protocol: TCP
  selector:
    app: backend
