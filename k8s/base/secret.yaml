# Secret configuration (base - use sealed secrets or external secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: xiaohang-api-secret
  namespace: xiaohang-api
type: Opaque
stringData:
  # Database credentials (use Kubernetes Sealed Secrets or external secrets manager)
  MYSQL_ROOT_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  MYSQL_DATABASE: "xiaohang_api"
  MYSQL_USER: "xiaohang_user"
  MYSQL_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis
  SPRING_REDIS_PASSWORD: ""
  
  # JWT
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION_xiaohang-api-platform-secret-key"
  
  # GitHub OAuth (optional)
  GITHUB_CLIENT_ID: ""
  GITHUB_CLIENT_SECRET: ""
  
  # OSS/COS credentials (optional)
  ALIYUN_OSS_ACCESS_KEY_ID: ""
  ALIYUN_OSS_ACCESS_KEY_SECRET: ""
  TENCENT_COS_SECRET_ID: ""
  TENCENT_COS_SECRET_KEY: ""
