# Development environment overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xiaohang-api-dev

bases:
  - ../../base

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: backend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: gateway
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: interface

images:
  - name: backend
    newTag: dev-latest
  - name: gateway
    newTag: dev-latest
  - name: interface
    newTag: dev-latest

commonLabels:
  environment: development

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=dev
      - DEBUG=true

replicas:
  - name: backend
    count: 1
  - name: gateway
    count: 1
  - name: interface
    count: 1
