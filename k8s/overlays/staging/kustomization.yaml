# Staging environment overlay
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xiaohang-api-staging

bases:
  - ../../base

images:
  - name: backend
    newTag: staging-latest
  - name: gateway
    newTag: staging-latest
  - name: interface
    newTag: staging-latest

commonLabels:
  environment: staging

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - SPRING_PROFILES_ACTIVE=staging

replicas:
  - name: backend
    count: 2
  - name: gateway
    count: 2
  - name: interface
    count: 1

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
    target:
      kind: Deployment
      name: backend
